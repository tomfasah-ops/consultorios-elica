<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Configuración | Consultorios Elica</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><header class="top"><h1>Configuración del centro</h1><p>Profesionales, especialidades y horarios</p></header><main class="wrap"><nav class="nav"><a class="btn secondary" href="panel.html">Panel</a><a class="btn" href="agenda.html">Agenda</a><a class="btn" href="pacientes.html">Pacientes</a><button class="btn danger" onclick="logout()">Salir</button></nav><section class="grid"><article class="card"><h2>Agregar profesional</h2><form id="profForm"><label>Nombre</label><input id="profNombre" required placeholder="Ej: Dra. Ana Pérez"><label>Especialidad</label><select id="profEspecialidad"></select><button class="btn full" type="submit">Guardar profesional</button></form><div id="profMsg" class="msg"></div></article><article class="card"><h2>Agregar especialidad</h2><form id="espForm"><label>Nombre</label><input id="espNombre" required placeholder="Ej: Nutrición"><button class="btn full" type="submit">Guardar especialidad</button></form><div id="espMsg" class="msg"></div></article><article class="card"><h2>Agregar horario</h2><form id="horForm"><label>Profesional</label><select id="horProfesional"></select><label>Día</label><select id="horDia" multiple size="5"><option>Lunes</option><option>Martes</option><option>Miércoles</option><option>Jueves</option><option>Viernes</option></select><label>Hora inicio</label><input type="time" id="horInicio" value="08:00" required><label>Hora fin</label><input type="time" id="horFin" value="20:00" required><button class="btn full" type="submit">Guardar horario</button></form><div id="horMsg" class="msg"></div></article></section><section class="card"><h2>Profesionales activos</h2><table class="table"><thead><tr><th>Nombre</th><th>Especialidad</th><th>Acción</th></tr></thead><tbody id="profBody"></tbody></table></section><section class="card"><h2>Especialidades activas</h2><table class="table"><thead><tr><th>Nombre</th><th>Acción</th></tr></thead><tbody id="espBody"></tbody></table></section><section class="card"><h2>Horarios cargados</h2><table class="table"><thead><tr><th>Profesional</th><th>Día</th><th>Inicio</th><th>Fin</th><th>Acción</th></tr></thead><tbody id="horBody"></tbody></table></section></main><script src="app.js"></script></body></html>
