<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reservar turno | Consultorios Elica</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><header class="top"><h1>Ingreso paciente</h1><p>Reservá tu turno en Consultorios Elica</p></header><main class="wrap"><a href="index.html">← Volver</a><section class="card"><h2>Solicitar turno</h2><form id="turnoForm"><div class="grid"><div><label>Especialidad</label><select id="especialidad" required><option value="">Seleccionar</option></select></div><div><label>Profesional</label><select id="profesional" required><option value="">Seleccionar</option></select></div><div><label>Día</label><input type="date" id="fecha" required></div><div><label>Horario</label><select id="hora" required><option value="">Seleccionar</option></select></div><div><label>Nombre y apellido</label><input id="nombre" required></div><div><label>DNI</label><input id="dni"></div><div><label>WhatsApp</label><input id="telefono" required></div><div><label>Obra social / Particular</label><input id="obra_social"></div></div><label>Motivo de consulta</label><textarea id="motivo"></textarea><br><br><button class="btn" type="submit">Solicitar turno</button></form><div id="msg" class="msg"></div></section>
<section class="card">
  <h2>Cancelar turno</h2>
  <p class="muted">Si ya tenés un turno reservado, podés buscarlo con tus datos y cancelarlo. Al cancelarlo, el horario vuelve a quedar disponible.</p>
  <form id="cancelForm">
    <div class="grid">
      <div><label>DNI</label><input id="cancelDni" placeholder="Ej: 12345678"></div>
      <div><label>WhatsApp</label><input id="cancelTelefono" placeholder="Ej: 11 4175 9531"></div>
      <div><label>Fecha del turno</label><input type="date" id="cancelFecha"></div>
    </div>
    <br><button class="btn secondary" type="submit">Buscar mi turno</button>
  </form>
  <div id="cancelMsg" class="msg"></div>
  <div id="cancelResultados" class="cancel-results"></div>
</section>
</main><script src="app.js"></script></body></html>
